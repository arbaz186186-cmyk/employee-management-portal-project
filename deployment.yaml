apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-management-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-management

  template:
    metadata:
      labels:
        app: employee-management

    spec:
      containers:
      - name: employee-management-container
        image: employee-management-portal:jenkins
        imagePullPolicy: Never
        ports:
        - containerPort: 80
